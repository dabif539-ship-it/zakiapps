<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Zaki Apps | مدير التطبيقات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .hero {
            background: white;
            border-radius: 60px;
            padding: 2rem 2.5rem;
            margin-bottom: 3rem;
            text-align: center;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #111, #2e7d32, #111);
        }
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #111, #2e7d32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero p { color: #666; margin-top: 10px; }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }
        .tab-btn {
            background: white;
            border: 1px solid #e0e0e0;
            padding: 1rem 2.2rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #333;
        }
        .tab-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .tab-btn.active { background: #111; color: white; border-color: #111; }
        .tab-content { display: none; animation: fadeUp 0.5s ease; }
        .tab-content.active-content { display: block; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }
        .app-card {
            background: white;
            border-radius: 32px;
            padding: 1.5rem;
            transition: all 0.4s;
            box-shadow: 0 15px 35px -15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            position: relative;
            overflow: hidden;
        }
        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #111, #2e7d32, #111);
            transform: scaleX(0);
            transition: transform 0.4s;
        }
        .app-card:hover::before { transform: scaleX(1); }
        .app-card:hover { transform: translateY(-10px); box-shadow: 0 30px 50px -20px rgba(0,0,0,0.2); }
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 24px;
            background: #f0f0f0;
            margin-bottom: 1.2rem;
        }
        .card-title { font-size: 1.6rem; font-weight: 800; color: #111; margin-bottom: 0.5rem; }
        .card-desc { color: #666; line-height: 1.6; margin-bottom: 1rem; }
        .platform-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
        .platform-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .platform-badge.android { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .platform-badge.windows { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdef5; }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #111;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .download-btn:hover { gap: 15px; background: #2e7d32; transform: scale(1.02); }
        .admin-controls {
            display: flex;
            gap: 12px;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid #eee;
        }
        .edit-btn, .delete-btn {
            border: 1px solid #ddd;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            background: #f8f8f8;
            color: #333;
        }
        .edit-btn:hover { background: #111; color: white; }
        .delete-btn:hover { background: #d32f2f; color: white; }
        .admin-panel {
            background: white;
            border-radius: 48px;
            padding: 2rem;
            margin-top: 3rem;
            box-shadow: 0 25px 50px -15px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
            display: none;
        }
        .admin-panel.show { display: block; }
        .admin-panel h3 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid #eee;
            color: #111;
        }
        .form-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.2rem; }
        .form-group { flex: 1; min-width: 180px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; color: #333; }
        input, select, textarea {
            width: 100%;
            padding: 12px 18px;
            border-radius: 30px;
            border: 1px solid #ddd;
            background: #fafafa;
            font-size: 0.95rem;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2e7d32; }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 30px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }
        .upload-area:hover { border-color: #2e7d32; background: #f0fdf4; }
        .upload-area i { font-size: 2rem; color: #999; margin-bottom: 8px; }
        .upload-area p { color: #666; font-size: 0.8rem; }
        .file-info { margin-top: 8px; font-size: 0.75rem; color: #2e7d32; }
        .image-preview { margin-top: 12px; display: flex; justify-content: center; }
        .image-preview img { max-width: 100%; max-height: 100px; border-radius: 16px; }
        .btn-primary {
            background: #111;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary:hover { background: #2e7d32; }
        .btn-save { background: #2e7d32; margin-right: 10px; }
        .btn-save:hover { background: #1b5e20; }
        .empty-message {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 32px;
            color: #999;
            border: 1px solid #eee;
            grid-column: 1 / -1;
        }
        .support-box {
            background: white;
            border-radius: 48px;
            padding: 2.5rem;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .email-card {
            background: #f5f5f5;
            border-radius: 50px;
            padding: 1rem 2rem;
            margin: 1.5rem auto;
            display: inline-flex;
            gap: 15px;
        }
        .email-card a { color: #111; text-decoration: none; font-weight: 700; }
        .comment-form input, .comment-form textarea { width: 100%; margin-bottom: 10px; }
        .comment-item {
            background: #fafafa;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1rem;
            text-align: right;
        }
        .admin-badge {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: #111;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            border: none;
            z-index: 100;
        }
        .admin-badge:hover { background: #2e7d32; transform: scale(1.05); }
        .footer-note { text-align: center; margin-top: 3rem; color: #999; font-size: 0.85rem; }
        .toast-message {
            position: fixed;
            bottom: 100px;
            right: 25px;
            background: #111;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .login-modal {
            background: white;
            border-radius: 48px;
            padding: 2.5rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .login-modal input {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: 1px solid #ddd;
            margin: 1rem 0;
            text-align: center;
        }
        .login-modal button {
            width: 100%;
            background: #111;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>Zaki Apps</h1>
        <p>📱 أضف تطبيقاتك وألعابك بنفسك | رفع صور وملفات من جهازك</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="apps">📱 تطبيقات</button>
        <button class="tab-btn" data-tab="games">🎮 ألعاب</button>
        <button class="tab-btn" data-tab="support">💬 دعم</button>
    </div>

    <div id="apps" class="tab-content active-content">
        <div class="cards-grid" id="appsContainer"></div>
    </div>

    <div id="games" class="tab-content">
        <div class="cards-grid" id="gamesContainer"></div>
    </div>

    <div id="support" class="tab-content">
        <div class="support-box">
            <i class="fas fa-envelope-open-text" style="font-size: 2.5rem;"></i>
            <h2 style="margin: 0.5rem 0;">الدعم</h2>
            <div class="email-card">
                <i class="fas fa-envelope"></i>
                <a href="mailto:dabif539@gmail.com">dabif539@gmail.com</a>
            </div>
            <div style="margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1.5rem;">
                <h3>💬 التعليقات</h3>
                <div class="comment-form">
                    <input type="text" id="commentName" placeholder="اسمك">
                    <textarea id="commentText" rows="2" placeholder="اكتب تعليقك..."></textarea>
                    <button class="btn-primary" id="submitCommentBtn">إرسال</button>
                </div>
                <div id="commentsList"></div>
            </div>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h3>⚙️ لوحة التحكم - أضف تطبيقك الآن</h3>
        <div class="form-row">
            <div class="form-group">
                <label>النوع</label>
                <select id="itemType">
                    <option value="app">تطبيق</option>
                    <option value="game">لعبة</option>
                </select>
            </div>
            <div class="form-group">
                <label>العنوان</label>
                <input type="text" id="itemTitle" placeholder="مثال: برنامجي الرائع">
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="itemDesc" rows="1" placeholder="وصف التطبيق"></textarea>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>نظام التشغيل</label>
                <select id="itemPlatform">
                    <option value="android">📱 أندرويد</option>
                    <option value="windows">💻 ويندوز</option>
                    <option value="both">🌐 كلاهما</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>📸 رفع صورة</label>
                <div class="upload-area" id="imageUploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اضغط لاختيار صورة</p>
                    <input type="file" id="imageFileInput" accept="image/*" style="display: none;">
                </div>
                <div class="image-preview" id="imagePreview"></div>
            </div>
            <div class="form-group">
                <label>📦 رفع ملف التحميل (APK/EXE/ZIP)</label>
                <div class="upload-area" id="fileUploadArea">
                    <i class="fas fa-file-upload"></i>
                    <p>اضغط لرفع ملف التطبيق</p>
                    <input type="file" id="fileInput" accept="*/*" style="display: none;">
                </div>
                <div id="fileInfo" class="file-info"></div>
            </div>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button class="btn-primary btn-save" id="savePageBtn"><i class="fas fa-save"></i> 💾 حفظ الصفحة</button>
            <button class="btn-primary" id="addItemBtn"><i class="fas fa-plus-circle"></i> إضافة</button>
            <button class="btn-primary" id="cancelEditBtn" style="background:#888; display: none;">إلغاء</button>
        </div>
        <p id="formFeedback" style="margin-top: 12px; color:#2e7d32;"></p>
    </div>
    
    <div class="footer-note">
        <i class="fas fa-plus-circle"></i> اضغط "دخول المدير" ثم أضف تطبيقاتك | بعد الإضافة اضغط "حفظ الصفحة"
    </div>
</div>

<button class="admin-badge" id="adminLoginBtn">
    <i class="fas fa-user-shield"></i> دخول المدير
</button>

<script>
    const ADMIN_PASSWORD = "zaki2024";
    let isAdmin = false;
    let appsData = [];
    let gamesData = [];
    let commentsData = [];
    let currentEditingItem = null;
    let currentImageData = null;
    let currentFileData = null;

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function saveToLocalStorage() {
        localStorage.setItem('zaki_apps', JSON.stringify(appsData));
        localStorage.setItem('zaki_games', JSON.stringify(gamesData));
        localStorage.setItem('zaki_comments', JSON.stringify(commentsData));
    }

    function loadFromLocalStorage() {
        const storedApps = localStorage.getItem('zaki_apps');
        const storedGames = localStorage.getItem('zaki_games');
        const storedComments = localStorage.getItem('zaki_comments');
        if(storedApps) appsData = JSON.parse(storedApps);
        if(storedGames) gamesData = JSON.parse(storedGames);
        if(storedComments) commentsData = JSON.parse(storedComments);
        if(!appsData) appsData = [];
        if(!gamesData) gamesData = [];
        if(!commentsData) commentsData = [];
    }

    function saveFullPage() {
        const htmlContent = document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `zaki_apps_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('✅ تم حفظ الصفحة بنجاح!');
    }

    function triggerDownload(fileData, filename) {
        if(!fileData || !fileData.data) {
            alert("⚠️ لا يوجد ملف للتحميل");
            return;
        }
        try {
            const byteCharacters = atob(fileData.data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: fileData.type || 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`جاري تحميل ${filename}`);
        } catch(e) { alert("خطأ في التحميل"); }
    }

    function renderComments() {
        const container = document.getElementById('commentsList');
        if(!container) return;
        if(commentsData.length === 0) {
            container.innerHTML = '<div style="color:#999; padding:1rem;">لا توجد تعليقات</div>';
            return;
        }
        container.innerHTML = commentsData.map(c => `
            <div class="comment-item">
                <div><strong>${escapeHtml(c.name)}</strong> <span style="font-size:0.7rem; color:#999;">${c.date}</span></div>
                <div style="margin-top:5px;">${escapeHtml(c.text)}</div>
                ${isAdmin ? `<button onclick="deleteComment('${c.id}')" style="background:none; border:none; color:#d32f2f; cursor:pointer; margin-top:5px;">🗑️ حذف</button>` : ''}
            </div>
        `).join('');
    }

    window.deleteComment = function(id) {
        if(!isAdmin) return;
        if(confirm('حذف التعليق؟')) {
            commentsData = commentsData.filter(c => c.id !== id);
            saveToLocalStorage();
            renderComments();
            showToast('تم الحذف');
        }
    };

    function addComment(name, text) {
        if(!name.trim() || !text.trim()) { showToast('أدخل الاسم والتعليق'); return false; }
        commentsData.unshift({ id: Date.now().toString(), name: name.trim(), text: text.trim(), date: new Date().toLocaleString('ar-EG') });
        saveToLocalStorage();
        renderComments();
        showToast('تم الإضافة');
        return true;
    }

    function getPlatformBadges(platform) {
        if(platform === 'both') {
            return `<span class="platform-badge android"><i class="fab fa-android"></i> أندرويد</span>
                    <span class="platform-badge windows"><i class="fab fa-windows"></i> ويندوز</span>`;
        } else if(platform === 'android') {
            return `<span class="platform-badge android"><i class="fab fa-android"></i> أندرويد</span>`;
        } else {
            return `<span class="platform-badge windows"><i class="fab fa-windows"></i> ويندوز</span>`;
        }
    }

    function getImageHtml(item) {
        if(item.imageData) {
            return `<img class="card-img" src="${item.imageData}" alt="${escapeHtml(item.title)}">`;
        } else {
            const icon = item.type === 'app' ? 'fa-mobile-alt' : 'fa-gamepad';
            return `<div class="card-img" style="background:#f0f0f0; display:flex; align-items:center; justify-content:center;"><i class="fas ${icon}" style="font-size:3rem; color:#aaa;"></i></div>`;
        }
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function renderApps() {
        const container = document.getElementById('appsContainer');
        if(!container) return;
        if(appsData.length === 0) {
            container.innerHTML = `<div class="empty-message"><i class="fas fa-folder-open"></i><br>📭 لا توجد تطبيقات<br>👆 اضغط "دخول المدير" ثم أضف تطبيقك الأول</div>`;
            return;
        }
        container.innerHTML = appsData.map(app => `
            <div class="app-card">
                ${getImageHtml(app)}
                <div class="card-title">${escapeHtml(app.title)}</div>
                <div class="card-desc">${escapeHtml(app.description)}</div>
                <div class="platform-badges">${getPlatformBadges(app.platform)}</div>
                <button class="download-btn" onclick="downloadItem('${app.id}','app')">
                    <i class="fas fa-download"></i> تحميل مباشر
                </button>
                ${isAdmin ? `
                    <div class="admin-controls">
                        <button class="edit-btn" onclick="editItem('app','${app.id}')">✏️ تعديل</button>
                        <button class="delete-btn" onclick="deleteItem('app','${app.id}')">🗑️ حذف</button>
                    </div>
                ` : ''}
            </div>
        `).join('');
    }

    function renderGames() {
        const container = document.getElementById('gamesContainer');
        if(!container) return;
        if(gamesData.length === 0) {
            container.innerHTML = `<div class="empty-message"><i class="fas fa-gamepad"></i><br>🎮 لا توجد ألعاب<br>👆 اضغط "دخول المدير" ثم أضف لعبتك الأولى</div>`;
            return;
        }
        container.innerHTML = gamesData.map(game => `
            <div class="app-card">
                ${getImageHtml(game)}
                <div class="card-title">${escapeHtml(game.title)}</div>
                <div class="card-desc">${escapeHtml(game.description)}</div>
                <div class="platform-badges">${getPlatformBadges(game.platform)}</div>
                <button class="download-btn" onclick="downloadItem('${game.id}','game')">
                    <i class="fas fa-download"></i> تحميل مباشر
                </button>
                ${isAdmin ? `
                    <div class="admin-controls">
                        <button class="edit-btn" onclick="editItem('game','${game.id}')">✏️ تعديل</button>
                        <button class="delete-btn" onclick="deleteItem('game','${game.id}')">🗑️ حذف</button>
                    </div>
                ` : ''}
            </div>
        `).join('');
    }

    window.downloadItem = function(id, type) {
        let item = type === 'app' ? appsData.find(a => a.id === id) : gamesData.find(g => g.id === id);
        if(item && item.fileData) {
            triggerDownload(item.fileData, `${item.title}.${item.fileData.name.split('.').pop() || 'file'}`);
        } else {
            alert("⚠️ لا يوجد ملف مرفق لهذا المحتوى");
        }
    };

    window.editItem = (type, id) => {
        let item = type === 'app' ? appsData.find(a => a.id === id) : gamesData.find(g => g.id === id);
        if(!item) return;
        document.getElementById('itemType').value = type;
        document.getElementById('itemTitle').value = item.title;
        document.getElementById('itemDesc').value = item.description;
        document.getElementById('itemPlatform').value = item.platform;
        if(item.imageData) {
            document.getElementById('imagePreview').innerHTML = `<img src="${item.imageData}">`;
            currentImageData = item.imageData;
        }
        if(item.fileData) {
            document.getElementById('fileInfo').innerHTML = `<i class="fas fa-check-circle"></i> ملف: ${item.fileData.name}`;
            currentFileData = item.fileData;
        }
        currentEditingItem = { id, type };
        document.getElementById('addItemBtn').innerHTML = '💾 تحديث';
        document.getElementById('cancelEditBtn').style.display = 'inline-flex';
    };

    window.deleteItem = (type, id) => {
        if(confirm('حذف نهائي؟')) {
            if(type === 'app') appsData = appsData.filter(a => a.id !== id);
            else gamesData = gamesData.filter(g => g.id !== id);
            saveToLocalStorage();
            renderApps();
            renderGames();
            showToast('تم الحذف');
            if(currentEditingItem?.id === id) resetEditMode();
        }
    };

    function resetEditMode() {
        currentEditingItem = null;
        currentImageData = null;
        currentFileData = null;
        document.getElementById('addItemBtn').innerHTML = '<i class="fas fa-plus-circle"></i> إضافة';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('itemTitle').value = '';
        document.getElementById('itemDesc').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('fileInfo').innerHTML = '';
        document.getElementById('formFeedback').innerHTML = '';
        document.getElementById('imageFileInput').value = '';
        document.getElementById('fileInput').value = '';
    }

    function addOrUpdateItem() {
        const type = document.getElementById('itemType').value;
        const title = document.getElementById('itemTitle').value.trim();
        const desc = document.getElementById('itemDesc').value.trim();
        const platform = document.getElementById('itemPlatform').value;
        
        if(!title || !desc) {
            document.getElementById('formFeedback').innerHTML = '⚠️ العنوان والوصف مطلوبة';
            return;
        }
        
        if(!currentFileData && !currentEditingItem) {
            document.getElementById('formFeedback').innerHTML = '⚠️ الرجاء رفع ملف التحميل';
            return;
        }
        
        if(currentEditingItem) {
            const { id, type: oldType } = currentEditingItem;
            const finalFile = currentFileData || (oldType === 'app' ? appsData.find(i=>i.id===id)?.fileData : gamesData.find(i=>i.id===id)?.fileData);
            const finalImage = currentImageData || (oldType === 'app' ? appsData.find(i=>i.id===id)?.imageData : gamesData.find(i=>i.id===id)?.imageData);
            
            if(oldType === 'app') {
                const idx = appsData.findIndex(i => i.id === id);
                if(idx !== -1) appsData[idx] = { ...appsData[idx], title, description: desc, platform, imageData: finalImage, fileData: finalFile };
                renderApps();
            } else {
                const idx = gamesData.findIndex(i => i.id === id);
                if(idx !== -1) gamesData[idx] = { ...gamesData[idx], title, description: desc, platform, imageData: finalImage, fileData: finalFile };
                renderGames();
            }
            saveToLocalStorage();
            showToast('تم التحديث');
            resetEditMode();
        } else {
            const newId = `${type}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
            const newItem = { id: newId, title, description: desc, platform, imageData: currentImageData, fileData: currentFileData, type };
            if(type === 'app') appsData.push(newItem);
            else gamesData.push(newItem);
            renderApps();
            renderGames();
            saveToLocalStorage();
            showToast('✅ تمت الإضافة بنجاح!');
            resetEditMode();
        }
    }

    function setupUploads() {
        const imgArea = document.getElementById('imageUploadArea');
        const imgInput = document.getElementById('imageFileInput');
        imgArea.onclick = () => imgInput.click();
        imgInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentImageData = ev.target.result;
                    document.getElementById('imagePreview').innerHTML = `<img src="${currentImageData}">`;
                };
                reader.readAsDataURL(file);
            }
        };
        
        const fileArea = document.getElementById('fileUploadArea');
        const fileInput = document.getElementById('fileInput');
        fileArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentFileData = { name: file.name, type: file.type, data: ev.target.result.split(',')[1], size: file.size };
                    document.getElementById('fileInfo').innerHTML = `<i class="fas fa-check-circle"></i> ${file.name} (${(file.size/1024).toFixed(2)} KB) - جاهز`;
                };
                reader.readAsDataURL(file);
            }
        };
    }

    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-content'));
                document.getElementById(tabId).classList.add('active-content');
                if(tabId === 'support') renderComments();
            });
        });
    }

    function showAdminLoginModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="login-modal">
                <i class="fas fa-user-shield" style="font-size:3rem; color:#2e7d32;"></i>
                <h3>دخول المدير</h3>
                <input type="password" id="adminPassInput" placeholder="كلمة المرور">
                <button id="confirmAdminBtn">تأكيد</button>
                <p id="loginError" style="color:#d32f2f; margin-top:10px;"></p>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('confirmAdminBtn').onclick = () => {
            if(document.getElementById('adminPassInput').value === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('adminPanel').classList.add('show');
                document.getElementById('adminLoginBtn').style.background = '#2e7d32';
                document.getElementById('adminLoginBtn').innerHTML = '<i class="fas fa-user-check"></i> المدير نشط';
                renderApps();
                renderGames();
                renderComments();
                modal.remove();
                setupUploads();
                showToast('مرحباً مدير');
            } else {
                document.getElementById('loginError').textContent = '❌ كلمة المرور غير صحيحة';
            }
        };
    }

    loadFromLocalStorage();
    renderApps();
    renderGames();
    renderComments();
    initTabs();
    
    document.getElementById('adminLoginBtn').onclick = showAdminLoginModal;
    document.getElementById('addItemBtn').onclick = addOrUpdateItem;
    document.getElementById('cancelEditBtn').onclick = resetEditMode;
    document.getElementById('savePageBtn').onclick = saveFullPage;
    document.getElementById('submitCommentBtn').onclick = () => {
        const name = document.getElementById('commentName').value;
        const text = document.getElementById('commentText').value;
        if(addComment(name, text)) {
            document.getElementById('commentName').value = '';
            document.getElementById('commentText').value = '';
        }
    };
</script>
</body>
</html>

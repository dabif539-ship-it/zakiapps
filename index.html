<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Zaki Apps | منصة احترافية فائقة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* جسيمات متحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* هيدر فاخر */
        .hero {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 2.5rem 3rem;
            margin-bottom: 3rem;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero:hover {
            transform: translateY(-8px);
            box-shadow: 0 40px 60px -25px rgba(0,0,0,0.6);
            border-color: rgba(255,255,255,0.15);
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #a78bfa, #c084fc, #e879f9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(167,139,250,0.3);
            position: relative;
            z-index: 1;
        }

        .hero p {
            color: rgba(255,255,255,0.6);
            font-weight: 500;
            margin-top: 15px;
            font-size: 1.2rem;
        }

        /* زر المدير */
        .admin-badge {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .admin-badge:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        /* أزرار التبويب */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .tab-btn {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 70px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.4s;
            z-index: -1;
        }

        .tab-btn:hover::before {
            opacity: 0.15;
        }

        .tab-btn:hover {
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.3);
            color: white;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
            box-shadow: 0 15px 35px rgba(102,126,234,0.4);
        }

        .tab-content {
            display: none;
            animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-content.active-content {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* شبكة البطاقات */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2.5rem;
            margin-top: 1.5rem;
        }

        /* بطاقة فاخرة */
        .app-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 1.8rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            transform: scaleX(0);
            transition: transform 0.5s;
        }

        .app-card:hover::before {
            transform: scaleX(1);
        }

        .app-card:hover {
            transform: translateY(-12px);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 35px 55px -20px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.15);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 28px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.4);
            margin-bottom: 1.3rem;
            transition: transform 0.5s;
        }

        .app-card:hover .card-img {
            transform: scale(1.03);
        }

        .card-title {
            font-size: 1.7rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card-desc {
            color: rgba(255,255,255,0.55);
            font-weight: 500;
            margin-bottom: 1.2rem;
            line-height: 1.6;
            flex-grow: 1;
        }

        /* أوسمة دعم الأنظمة */
        .platform-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.2rem;
        }

        .platform-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .platform-badge.android {
            background: rgba(61,220,132,0.2);
            color: #3ddc84;
            border: 1px solid rgba(61,220,132,0.3);
        }

        .platform-badge.windows {
            background: rgba(0,120,212,0.2);
            color: #0078d4;
            border: 1px solid rgba(0,120,212,0.3);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 800;
            width: fit-content;
            transition: all 0.4s;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            box-shadow: 0 8px 20px rgba(102,126,234,0.3);
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn:hover {
            gap: 18px;
            transform: scale(1.03);
            box-shadow: 0 12px 30px rgba(102,126,234,0.5);
        }

        .admin-controls {
            display: flex;
            gap: 12px;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .edit-btn, .delete-btn {
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            transition: all 0.3s;
        }

        .edit-btn:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        .delete-btn:hover {
            background: #c0392b;
            color: white;
            border-color: transparent;
        }

        /* لوحة التحكم */
        .admin-panel {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 2rem;
            margin-top: 3rem;
            box-shadow: 0 25px 50px -15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            display: none;
        }

        .admin-panel.show {
            display: block;
            animation: fadeUp 0.5s;
        }

        .admin-panel h3 {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            color: white;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 20px;
            border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .file-upload-area, .image-upload-area {
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 35px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
        }

        .file-upload-area:hover, .image-upload-area:hover {
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
        }

        .image-preview {
            margin-top: 12px;
            display: flex;
            justify-content: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: scale(0.98);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        /* قسم الدعم */
        .support-box {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 2.5rem;
            box-shadow: 0 25px 45px -15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 650px;
            margin: 0 auto;
            text-align: center;
        }

        .support-box i {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }

        .support-box h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: white;
        }

        .email-card {
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 1rem 2rem;
            margin: 1.5rem auto;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }

        .email-card:hover {
            transform: scale(1.03);
            background: rgba(255,255,255,0.08);
        }

        .email-card a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .contact-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .contact-btn {
            background: rgba(255,255,255,0.05);
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }

        .contact-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
        }

        .comments-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .comment-form {
            background: rgba(0,0,0,0.2);
            padding: 1.5rem;
            border-radius: 35px;
            margin-bottom: 2rem;
        }

        .comment-form input, .comment-form textarea {
            margin-bottom: 1rem;
        }

        .comments-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .comment-item {
            background: rgba(255,255,255,0.03);
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .comment-item:hover {
            background: rgba(255,255,255,0.05);
            transform: translateX(-5px);
        }

        .comment-name {
            font-weight: 800;
            color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .comment-date {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }

        .comment-text {
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
            margin-top: 8px;
        }

        .delete-comment-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .password-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 50px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .password-box input {
            width: 100%;
            margin: 1rem 0;
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
        }

        .toast-message {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 1000;
            animation: slideIn 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* شريط تمرير مخصص */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .hero h1 { font-size: 2rem; }
            .hero { padding: 1.5rem; }
            .tab-btn { padding: 0.6rem 1.5rem; font-size: 0.9rem; }
            .cards-grid { gap: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
    <div class="hero">
        <h1>Zaki Apps</h1>
        <p>منصة احترافية فائقة | تحميل مباشر - أندرويد و ويندوز</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="apps"><i class="fas fa-th-large"></i> تطبيقات</button>
        <button class="tab-btn" data-tab="games"><i class="fas fa-gamepad"></i> ألعاب</button>
        <button class="tab-btn" data-tab="support"><i class="fas fa-headset"></i> دعم</button>
    </div>

    <div id="apps" class="tab-content active-content">
        <div class="cards-grid" id="appsContainer"></div>
    </div>

    <div id="games" class="tab-content">
        <div class="cards-grid" id="gamesContainer"></div>
    </div>

    <div id="support" class="tab-content">
        <div class="support-box">
            <i class="fas fa-envelope-open-text"></i>
            <h2>مركز الدعم</h2>
            <div class="email-card">
                <i class="fas fa-envelope"></i>
                <a href="mailto:dabif539@gmail.com">dabif539@gmail.com</a>
            </div>
            <div class="contact-buttons">
                <a href="mailto:dabif539@gmail.com" class="contact-btn"><i class="fas fa-paper-plane"></i> إرسال بريد</a>
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=dabif539@gmail.com" target="_blank" class="contact-btn"><i class="fab fa-google"></i> Gmail</a>
            </div>
            <div class="comments-section">
                <h3 style="margin-bottom: 1rem; color:white;"><i class="fas fa-comments"></i> آراء المستخدمين</h3>
                <div class="comment-form">
                    <input type="text" id="commentName" placeholder="اسمك">
                    <textarea id="commentText" rows="3" placeholder="اكتب تعليقك..."></textarea>
                    <button class="btn-primary" id="submitCommentBtn"><i class="fas fa-paper-plane"></i> إرسال</button>
                </div>
                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h3><i class="fas fa-sliders-h"></i> لوحة التحكم الفاخرة</h3>
        <div class="form-row">
            <div class="form-group">
                <label>نوع المحتوى</label>
                <select id="itemType">
                    <option value="app">تطبيق</option>
                    <option value="game">لعبة</option>
                </select>
            </div>
            <div class="form-group">
                <label>العنوان</label>
                <input type="text" id="itemTitle" placeholder="الاسم">
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="itemDesc" rows="1" placeholder="وصف"></textarea>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>نظام التشغيل</label>
                <select id="itemPlatform">
                    <option value="android">📱 أندرويد فقط</option>
                    <option value="windows">💻 ويندوز فقط</option>
                    <option value="both">🌐 كلاهما</option>
                </select>
            </div>
            <div class="form-group">
                <label>رابط التحميل</label>
                <input type="text" id="itemLink" placeholder="https://example.com/file">
            </div>
            <div class="form-group">
                <label>رابط الصورة</label>
                <input type="text" id="itemImage" placeholder="https://example.com/image.jpg">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>رفع ملف من جهازك</label>
                <div class="file-upload-area" id="fileUploadArea">
                    <i class="fas fa-file-upload"></i>
                    <p>اضغط لرفع ملف</p>
                    <input type="file" id="fileInput" accept="*/*" style="display: none;">
                </div>
                <div id="fileInfo" style="margin-top: 8px; color: #27ae60;"></div>
            </div>
            <div class="form-group">
                <label>رفع صورة من جهازك</label>
                <div class="image-upload-area" id="imageUploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اضغط لاختيار صورة</p>
                    <input type="file" id="imageFileInput" accept="image/*" style="display: none;">
                </div>
                <div class="image-preview" id="imagePreview"></div>
            </div>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button class="btn-primary" id="addItemBtn"><i class="fas fa-plus-circle"></i> إضافة</button>
            <button class="btn-primary" id="cancelEditBtn" style="background:#555; display: none;"><i class="fas fa-times"></i> إلغاء</button>
        </div>
        <p id="formFeedback" style="margin-top: 12px; color:#aaa;"></p>
    </div>
    
    <div class="footer-note">
        <i class="fas fa-crown"></i> Zaki Apps | تصميم احترافي فاخر | تحميل مباشر
    </div>
</div>

<div class="admin-badge" id="adminLoginBtn">
    <i class="fas fa-user-shield"></i> دخول المدير
</div>

<script>
    const ADMIN_PASSWORD = "zaki2024";
    let isAdmin = false;
    let appsData = [];
    let gamesData = [];
    let commentsData = [];
    let currentEditingItem = null;
    let currentImageDataUrl = null;
    let currentFileData = null;

    // جسيمات متحركة
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = 10 + Math.random() * 20 + 's';
            container.appendChild(particle);
        }
    }
    createParticles();

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function saveToLocalStorage() {
        localStorage.setItem('zaki_apps_appsData', JSON.stringify(appsData));
        localStorage.setItem('zaki_apps_gamesData', JSON.stringify(gamesData));
        localStorage.setItem('zaki_apps_comments', JSON.stringify(commentsData));
    }

    function loadFromLocalStorage() {
        const storedApps = localStorage.getItem('zaki_apps_appsData');
        const storedGames = localStorage.getItem('zaki_apps_gamesData');
        const storedComments = localStorage.getItem('zaki_apps_comments');
        if(storedApps) appsData = JSON.parse(storedApps);
        if(storedGames) gamesData = JSON.parse(storedGames);
        if(storedComments) commentsData = JSON.parse(storedComments);
        
        if((!appsData || appsData.length === 0) && (!gamesData || gamesData.length === 0)) {
            appsData = [
                { id: "app1", title: "Zaki Cleaner Pro", description: "منظف هاتف احترافي يزيل الملفات غير المرغوب فيها ويحسن الأداء بشكل ملحوظ.", platform: "android", imageUrl: "https://picsum.photos/id/104/300/180", link: "#", fileData: null, type: "app" },
                { id: "app2", title: "Zaki Studio", description: "برنامج تصميم وتحرير فيديو احترافي للويندوز بواجهة سلسة.", platform: "windows", imageUrl: "https://picsum.photos/id/0/300/180", link: "#", fileData: null, type: "app" },
                { id: "app3", title: "Zaki Sync", description: "مزامنة الملفات بين أندرويد وويندوز بسرعة فائقة وأمان تام.", platform: "both", imageUrl: "https://picsum.photos/id/1/300/180", link: "#", fileData: null, type: "app" }
            ];
            gamesData = [
                { id: "game1", title: "Speed Racer X", description: "سباق سيارات فائق السرعة مع رسومات ثلاثية الأبعاد واقعية.", platform: "android", imageUrl: "https://picsum.photos/id/106/300/180", link: "#", fileData: null, type: "game" },
                { id: "game2", title: "Chess Grandmaster", description: "لعبة شطرنج بذكاء اصطناعي متقدم للويندوز.", platform: "windows", imageUrl: "https://picsum.photos/id/26/300/180", link: "#", fileData: null, type: "game" }
            ];
            saveToLocalStorage();
        }
        if(!commentsData) commentsData = [];
    }

    function getPlatformBadges(platform) {
        if(platform === 'both') {
            return `
                <span class="platform-badge android"><i class="fab fa-android"></i> أندرويد</span>
                <span class="platform-badge windows"><i class="fab fa-windows"></i> ويندوز</span>
            `;
        } else if(platform === 'android') {
            return `<span class="platform-badge android"><i class="fab fa-android"></i> أندرويد</span>`;
        } else {
            return `<span class="platform-badge windows"><i class="fab fa-windows"></i> ويندوز</span>`;
        }
    }

    function triggerDownload(fileData, filename) {
        if(!fileData || !fileData.data) {
            alert("⚠️ الملف غير متوفر. الرجاء رفع ملف من لوحة التحكم.");
            return;
        }
        try {
            const byteCharacters = atob(fileData.data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: fileData.type || 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`جاري تحميل ${filename}`);
        } catch(e) { alert("خطأ في التحميل"); }
    }

    function renderComments() {
        const container = document.getElementById('commentsList');
        if(!container) return;
        if(commentsData.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:#666; padding:2rem;">لا توجد تعليقات بعد</div>`;
            return;
        }
        container.innerHTML = commentsData.map(c => `
            <div class="comment-item">
                <div class="comment-name"><i class="fas fa-user-circle"></i> ${escapeHtml(c.name)} <span class="comment-date">${c.date}</span></div>
                <div class="comment-text">${escapeHtml(c.text)}</div>
                ${isAdmin ? `<button class="delete-comment-btn" onclick="deleteComment('${c.id}')"><i class="fas fa-trash"></i> حذف</button>` : ''}
            </div>
        `).join('');
    }

    window.deleteComment = function(id) {
        if(!isAdmin) return;
        if(confirm('حذف التعليق؟')) {
            commentsData = commentsData.filter(c => c.id !== id);
            saveToLocalStorage();
            renderComments();
            showToast('تم الحذف');
        }
    };

    function addComment(name, text) {
        if(!name.trim() || !text.trim()) { showToast('أدخل الاسم والتعليق'); return false; }
        commentsData.unshift({ id: Date.now().toString(), name: name.trim(), text: text.trim(), date: new Date().toLocaleString('ar-EG') });
        saveToLocalStorage();
        renderComments();
        showToast('تم إضافة تعليقك');
        return true;
    }

    function getImageHtml(item) {
        if(item.imageUrl && item.imageUrl.startsWith('http')) {
            return `<img class="card-img" src="${item.imageUrl}" onerror="this.src='https://picsum.photos/id/20/300/180'">`;
        } else if(item.imageData) {
            return `<img class="card-img" src="${item.imageData}">`;
        }
        const icon = item.type === 'app' ? 'fa-mobile-alt' : 'fa-gamepad';
        return `<div class="card-img" style="background:linear-gradient(135deg,#1a1a2e,#16213e); display:flex; align-items:center; justify-content:center;"><i class="fas ${icon}" style="font-size:4rem; color:#667eea;"></i></div>`;
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function renderApps() {
        const container = document.getElementById('appsContainer');
        if(!container) return;
        if(appsData.length === 0) { container.innerHTML = `<div style="text-align:center; padding:3rem; color:#666;">📭 لا توجد تطبيقات</div>`; return; }
        container.innerHTML = appsData.map(app => `
            <div class="app-card">
                ${getImageHtml(app)}
                <div class="card-title">${escapeHtml(app.title)}</div>
                <div class="card-desc">${escapeHtml(app.description)}</div>
                <div class="platform-badges">${getPlatformBadges(app.platform || 'android')}</div>
                <button class="download-btn" data-id="${app.id}" data-type="app" data-filename="${escapeHtml(app.title)}.apk">
                    <i class="fas fa-download"></i> تحميل مباشر
                </button>
                ${isAdmin ? `<div class="admin-controls"><button class="edit-btn" data-id="${app.id}" data-type="app"><i class="fas fa-pen"></i> تعديل</button><button class="delete-btn" data-id="${app.id}" data-type="app"><i class="fas fa-trash"></i> حذف</button></div>` : ''}
            </div>
        `).join('');
        attachDownloadEvents();
        if(isAdmin) attachAdminEvents();
    }

    function renderGames() {
        const container = document.getElementById('gamesContainer');
        if(!container) return;
        if(gamesData.length === 0) { container.innerHTML = `<div style="text-align:center; padding:3rem; color:#666;">🎮 لا توجد ألعاب</div>`; return; }
        container.innerHTML = gamesData.map(game => `
            <div class="app-card">
                ${getImageHtml(game)}
                <div class="card-title">${escapeHtml(game.title)}</div>
                <div class="card-desc">${escapeHtml(game.description)}</div>
                <div class="platform-badges">${getPlatformBadges(game.platform || 'android')}</div>
                <button class="download-btn" data-id="${game.id}" data-type="game" data-filename="${escapeHtml(game.title)}.zip">
                    <i class="fas fa-download"></i> تحميل مباشر
                </button>
                ${isAdmin ? `<div class="admin-controls"><button class="edit-btn" data-id="${game.id}" data-type="game"><i class="fas fa-pen"></i> تعديل</button><button class="delete-btn" data-id="${game.id}" data-type="game"><i class="fas fa-trash"></i> حذف</button></div>` : ''}
            </div>
        `).join('');
        attachDownloadEvents();
        if(isAdmin) attachAdminEvents();
    }

    function attachDownloadEvents() {
        document.querySelectorAll('.download-btn').forEach(btn => {
            btn.removeEventListener('click', handleDownload);
            btn.addEventListener('click', handleDownload);
        });
    }

    function handleDownload(e) {
        const btn = e.currentTarget;
        const id = btn.getAttribute('data-id');
        const type = btn.getAttribute('data-type');
        let item = type === 'app' ? appsData.find(a => a.id === id) : gamesData.find(g => g.id === id);
        if(item) {
            if(item.fileData && item.fileData.data) {
                triggerDownload(item.fileData, `${item.title}.${item.fileData.name.split('.').pop() || 'file'}`);
            } else if(item.link && item.link !== '#' && item.link.startsWith('http')) {
                window.open(item.link, '_blank');
            } else {
                alert("⚠️ لا يوجد ملف للتحميل. الرجاء رفع ملف من لوحة التحكم.");
            }
        }
    }

    function attachAdminEvents() {
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.removeEventListener('click', handleEdit);
            btn.addEventListener('click', handleEdit);
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.removeEventListener('click', handleDelete);
            btn.addEventListener('click', handleDelete);
        });
    }

    function handleEdit(e) {
        const btn = e.currentTarget;
        const id = btn.getAttribute('data-id');
        const type = btn.getAttribute('data-type');
        let item = type === 'app' ? appsData.find(a => a.id === id) : gamesData.find(g => g.id === id);
        if(!item) return;
        document.getElementById('itemType').value = type;
        document.getElementById('itemTitle').value = item.title;
        document.getElementById('itemDesc').value = item.description;
        document.getElementById('itemPlatform').value = item.platform || 'android';
        document.getElementById('itemLink').value = item.link || '';
        document.getElementById('itemImage').value = item.imageUrl || '';
        if(item.imageData) document.getElementById('imagePreview').innerHTML = `<img src="${item.imageData}">`;
        if(item.fileData) document.getElementById('fileInfo').innerHTML = `<i class="fas fa-check-circle"></i> ملف: ${item.fileData.name}`;
        currentEditingItem = { id, type };
        currentFileData = item.fileData;
        currentImageDataUrl = item.imageData;
        document.getElementById('addItemBtn').innerHTML = '<i class="fas fa-save"></i> تحديث';
        document.getElementById('cancelEditBtn').style.display = 'inline-flex';
    }

    function handleDelete(e) {
        const btn = e.currentTarget;
        const id = btn.getAttribute('data-id');
        const type = btn.getAttribute('data-type');
        if(confirm('حذف نهائي؟')) {
            if(type === 'app') appsData = appsData.filter(a => a.id !== id);
            else gamesData = gamesData.filter(g => g.id !== id);
            saveToLocalStorage();
            renderApps(); renderGames();
            showToast('تم الحذف');
            if(currentEditingItem?.id === id) resetEditMode();
        }
    }

    function resetEditMode() {
        currentEditingItem = null;
        currentImageDataUrl = null;
        currentFileData = null;
        document.getElementById('addItemBtn').innerHTML = '<i class="fas fa-plus-circle"></i> إضافة';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('itemTitle').value = '';
        document.getElementById('itemDesc').value = '';
        document.getElementById('itemLink').value = '';
        document.getElementById('itemImage').value = '';
        document.getElementById('itemPlatform').value = 'android';
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('fileInfo').innerHTML = '';
    }

    function addOrUpdateItem() {
        const type = document.getElementById('itemType').value;
        const title = document.getElementById('itemTitle').value.trim();
        const desc = document.getElementById('itemDesc').value.trim();
        const platform = document.getElementById('itemPlatform').value;
        const link = document.getElementById('itemLink').value.trim();
        const imageUrl = document.getElementById('itemImage').value.trim();
        
        if(!title || !desc) {
            document.getElementById('formFeedback').innerHTML = '⚠️ العنوان والوصف مطلوبة';
            return;
        }
        
        if(currentEditingItem) {
            const { id, type: oldType } = currentEditingItem;
            const finalFile = currentFileData;
            const finalImage = currentImageDataUrl || imageUrl;
            if(oldType === 'app') {
                const idx = appsData.findIndex(i => i.id === id);
                if(idx !== -1) appsData[idx] = { ...appsData[idx], title, description: desc, platform, link, imageUrl: finalImage, imageData: currentImageDataUrl, fileData: finalFile };
                renderApps();
            } else {
                const idx = gamesData.findIndex(i => i.id === id);
                if(idx !== -1) gamesData[idx] = { ...gamesData[idx], title, description: desc, platform, link, imageUrl: finalImage, imageData: currentImageDataUrl, fileData: finalFile };
                renderGames();
            }
            saveToLocalStorage();
            showToast('تم التحديث');
            resetEditMode();
        } else {
            if(!currentFileData && !link) {
                document.getElementById('formFeedback').innerHTML = '⚠️ الرجاء رفع ملف أو إدخال رابط';
                return;
            }
            const newId = `${type}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
            const newItem = { id: newId, title, description: desc, platform, link: link || '#', imageUrl: imageUrl || null, imageData: currentImageDataUrl || null, fileData: currentFileData || null, type };
            if(type === 'app') appsData.push(newItem);
            else gamesData.push(newItem);
            renderApps(); renderGames();
            saveToLocalStorage();
            showToast('تمت الإضافة');
            resetEditMode();
        }
    }

    function setupUploads() {
        const fileArea = document.getElementById('fileUploadArea');
        const fileInput = document.getElementById('fileInput');
        if(fileArea) {
            fileArea.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        currentFileData = { name: file.name, type: file.type, data: ev.target.result.split(',')[1], size: file.size };
                        document.getElementById('fileInfo').innerHTML = `<i class="fas fa-check-circle"></i> ${file.name} - جاهز`;
                    };
                    reader.readAsDataURL(file);
                }
            };
        }
        const imgArea = document.getElementById('imageUploadArea');
        const imgInput = document.getElementById('imageFileInput');
        if(imgArea) {
            imgArea.onclick = () => imgInput.click();
            imgInput.onchange = (e) => {
                const file = e.target.files[0];
                if(file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        currentImageDataUrl = ev.target.result;
                        document.getElementById('imagePreview').innerHTML = `<img src="${currentImageDataUrl}">`;
                    };
                    reader.readAsDataURL(file);
                }
            };
        }
    }

    function showPasswordModal() {
        const modal = document.createElement('div');
        modal.className = 'password-modal';
        modal.innerHTML = `<div class="password-box"><i class="fas fa-lock" style="font-size:3rem; color:#667eea;"></i><h3 style="color:white;">دخول المدير</h3><input type="password" id="adminPassword" placeholder="كلمة المرور"><button id="submitPassword" class="btn-primary" style="width:100%;">تأكيد</button><p id="passError" style="color:#e74c3c; margin-top:10px;"></p></div>`;
        document.body.appendChild(modal);
        document.getElementById('submitPassword').onclick = () => {
            if(document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('adminPanel').classList.add('show');
                document.getElementById('adminLoginBtn').style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                document.getElementById('adminLoginBtn').innerHTML = '<i class="fas fa-user-check"></i> المدير نشط';
                renderApps(); renderGames(); renderComments();
                modal.remove();
                setupUploads();
                document.getElementById('addItemBtn').onclick = addOrUpdateItem;
                document.getElementById('cancelEditBtn').onclick = resetEditMode;
                showToast('مرحباً مدير');
            } else {
                document.getElementById('passError').innerText = 'كلمة المرور غير صحيحة';
            }
        };
    }

    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-content'));
                document.getElementById(tabId).classList.add('active-content');
                if(tabId === 'support') renderComments();
            };
        });
    }

    loadFromLocalStorage();
    renderApps(); renderGames(); renderComments();
    initTabs();
    document.getElementById('adminLoginBtn').onclick = showPasswordModal;
    document.getElementById('submitCommentBtn').onclick = () => {
        const name = document.getElementById('commentName').value;
        const text = document.getElementById('commentText').value;
        if(addComment(name, text)) {
            document.getElementById('commentName').value = '';
            document.getElementById('commentText').value = '';
        }
    };
</script>
</body>
</html>
